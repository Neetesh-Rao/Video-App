<!DOCTYPE html>
<html>
<head>
<title>Video Call App</title>
<style>
* { box-sizing: border-box; }
html, body { width:100%; height:100%; margin:0; font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; }
body { padding:16px; }
.app { height: calc(100vh - 32px); display:grid; grid-template-rows: auto auto 1fr; gap:12px; }
h2 { margin:0; font-size:22px; font-weight:700; }
.controls { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
#roomInput, button { padding:10px 12px; font-size:15px; border-radius:8px; border:1px solid #334155; }
#roomInput { min-width:220px; background:#0b1220; color:#e2e8f0; }
button { background-color:#0ea5e9; color:#ffffff; border:none; cursor:pointer; font-weight:600; }
button:hover { background-color:#0284c7; }
#audioStatus { font-weight:600; color:#cbd5e1; }
#videos { width:100%; height:100%; min-height:0; display:grid; grid-template-columns: repeat(auto-fill, minmax(min(100%,280px), 1fr)); gap:12px; align-content:start; overflow-y:auto; padding-right:4px; }
#videos video { width:100%; aspect-ratio:16/9; min-height:180px; border-radius:12px; border:1px solid #1e293b; background:#020617; object-fit:cover; display:block; box-shadow:0 8px 20px rgba(2,6,23,0.35); }
@media(max-width:640px){ body{padding:10px;} .app{height:calc(100vh - 20px);} #videos{gap:10px;} #videos video{min-height:160px;} }
</style>
</head>
<body>
<div class="app">
    <h2>Video Call App</h2>

    <div class="controls">
        <input id="roomInput" placeholder="Enter Room ID" />
        <button onclick="joinRoom()">Join Room</button>
        <div id="audioStatus">Audio: Checking...</div>
    </div>

    <div id="videos">
        <video id="localVideo" autoplay playsinline muted></video>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
